<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title id="titleTab">Clips - Imlayloo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Bouton paramètres -->
    <div class="settings-container">
        <div class="settings-button">⚙️</div>

        <div class="settings-menu">
            <a href="#" id="help-btn">Aide</a>

            <div class="lang-menu">
                <span>🌍 Langue</span>
                <a href="#" id="lang-fr">Français</a>
                <a href="#" id="lang-en">English</a>
            </div>
        </div>
    </div>

    <header>
        <h1>Imlayloo</h1>
        <nav>
            <a href="index.html" id="navHome">Accueil</a>
            <a href="clips.html" class="active" id="navClips">Clips</a>
            <a href="rediffusions.html" id="navVods">Rediffusions</a>
            <a href="reseaux.html" id="navSocial">Réseaux</a>
            <a href="commandes.html" id="navCmd">Commandes</a>
            <a href="apropos.html" id="navAbout">À propos</a>
        </nav>
    </header>

    <section class="section">
        <h2 id="clipsTitle"></h2>
        <p id="clipsText"></p>

        <div class="grid" id="clips"></div>
    </section>

    <!-- SCRIPT TWITCH -->
    <script>
    const api = "https://imlayloo-api.kevin2007baumann.workers.dev";
    const userId = "795341067";

    async function loadClips() {
        try {
            const res = await fetch(`${api}?endpoint=clips&broadcaster_id=${userId}&first=12`);
            const data = await res.json();

            const container = document.getElementById("clips");
            container.innerHTML = "";

            if (!data.data || data.data.length === 0) {
                container.innerHTML = "<p>Aucun clip disponible pour le moment.</p>";
                return;
            }

            data.data.forEach(clip => {
                const card = document.createElement("div");
                card.className = "clip-card";

                const thumb = clip.thumbnail_url
                    .replace("-preview-480x272.jpg", "-preview-320x180.jpg");

                card.innerHTML = `
                    <img src="${thumb}" class="clip-thumb">
                    <h3>${clip.title}</h3>
                    <button onclick="window.open('https://clips.twitch.tv/${clip.id}', '_blank')">
                        ▶ Voir le clip
                    </button>
                `;

                container.appendChild(card);
            });

        } catch (err) {
            console.error("Erreur lors du chargement des clips :", err);
        }
    }

    loadClips();
    </script>

    <!-- POPUP AIDE -->
    <div id="help-modal" class="modal">
        <div class="modal-content">
            <h2 id="helpTitle">Aide</h2>
            <p id="helpText">
                Si vous avez besoin d'aide, veuillez contacter le modérateur du site  
                dans le salon <strong>"site internet"</strong> sur Discord :
            </p>

            <a href="https://discord.gg/ChRDm27m9Y" target="_blank" class="discord-link" id="helpBtnLink">
                Ouvrir le Discord
            </a>

            <button id="close-help" class="close-btn">Fermer</button>
        </div>
    </div>

    <!-- SCRIPT MENU + MULTILINGUE -->
    <script src="script.js"></script>

</body>
</html>
