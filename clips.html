<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Clips - Imlayloo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Imlayloo</h1>
    <nav>
        <a href="index.html">Accueil</a>
        <a href="clips.html">Clips</a>
        <a href="rediffusions.html">Rediffusions</a>
        <a href="reseaux.html">Réseaux</a>
    </nav>
</header>

<div class="grid" id="clips"></div>

<script>
const clientId = "aupzds04y3oa2il45qns8908yjebsn";
const userId = "196955395";

async function getToken() {
    const res = await fetch("https://id.twitch.tv/oauth2/token?client_id=" + clientId + "&grant_type=client_credentials", {
        method: "POST"
    });
    return (await res.json()).access_token;
}

async function loadClips() {
    const token = await getToken();

    const res = await fetch(`https://api.twitch.tv/helix/clips?broadcaster_id=${userId}&first=12`, {
        headers: {
            "Client-ID": clientId,
            "Authorization": "Bearer " + token
        }
    });

    const data = await res.json();
    const container = document.getElementById("clips");

    data.data.forEach(clip => {
        const iframe = document.createElement("iframe");
        iframe.src = `https://clips.twitch.tv/embed?clip=${clip.id}&parent=darkmatraque.github.io&autoplay=false`;
        iframe.width = "100%";
        iframe.height = "180";
        iframe.frameBorder = "0";
        container.appendChild(iframe);
    });
}

loadClips();
</script>

</body>
</html>
