<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Rediffusions - Imlayloo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Bouton paramètres -->
    <div class="settings-container">
        <div class="settings-button">⚙️</div>

        <div class="settings-menu">
            <a href="#">Aide</a>
            <a href="#">Mode</a>
        </div>
    </div>

    <header>
        <h1>Imlayloo</h1>
        <nav>
            <a href="index.html">Accueil</a>
            <a href="clips.html">Clips</a>
            <a href="rediffusions.html" class="active">Rediffusions</a>
            <a href="reseaux.html">Réseaux</a>
            <a href="commandes.html">Commandes</a>
            <a href="apropos.html">À propos</a>
        </nav>
    </header>

    <section class="section">
        <h2>Rediffusions</h2>
        <div id="vods"></div>
    </section>

    <!-- SCRIPT TWITCH (colonne + dates) -->
    <script>
    const api = "https://imlayloo-api.kevin2007baumann.workers.dev";
    const userId = "795341067";

    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString("fr-FR", {
            year: "numeric",
            month: "long",
            day: "numeric"
        });
    }

    async function loadVods() {
        try {
            const res = await fetch(`${api}?endpoint=videos&user_id=${userId}&first=12`);
            const data = await res.json();

            const container = document.getElementById("vods");
            container.innerHTML = "";

            if (!data.data || data.data.length === 0) {
                container.innerHTML = "<p>Aucune rediffusion disponible pour le moment.</p>";
                return;
            }

            data.data.forEach(vod => {
                const card = document.createElement("div");
                card.className = "vod-card";

                const thumb = vod.thumbnail_url
                    .replace("%{width}", "480")
                    .replace("%{height}", "270");

                card.innerHTML = `
                    <p class="vod-date">${formatDate(vod.created_at)}</p>
                    <img src="${thumb}" class="vod-thumb">
                    <h3>${vod.title}</h3>
                    <button onclick="window.open('https://www.twitch.tv/videos/${vod.id}', '_blank')">
                        ▶ Voir la rediffusion
                    </button>
                `;

                container.appendChild(card);
            });

        } catch (err) {
            console.error("Erreur lors du chargement des rediffusions :", err);
        }
    }

    loadVods();
    </script>

    <!-- SCRIPT DU MENU PARAMÈTRES -->
    <script src="script.js"></script>

</body>
</html>
