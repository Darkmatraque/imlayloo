<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Clips - Imlayloo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Bouton paramètres -->
    <div class="settings-container">
        <div class="settings-button">⚙️</div>

        <div class="settings-menu">
            <a href="#" id="help-btn">Aide</a>
            <a href="#">Mode</a>
        </div>
    </div>

    <header>
        <h1>Imlayloo</h1>
        <nav>
            <a href="index.html">Accueil</a>
            <a href="clips.html" class="active">Clips</a>
            <a href="rediffusions.html">Rediffusions</a>
            <a href="reseaux.html">Réseaux</a>
            <a href="commandes.html">Commandes</a>
            <a href="apropos.html">À propos</a>
        </nav>
    </header>

    <section class="section">
        <h2>Clips</h2>
        <div class="grid" id="clips"></div>
    </section>

    <!-- SCRIPT TWITCH (fetch + grille) -->
    <script>
    const api = "https://imlayloo-api.kevin2007baumann.workers.dev";
    const userId = "795341067";

    async function loadClips() {
        try {
            const res = await fetch(`${api}?endpoint=clips&broadcaster_id=${userId}&first=12`);
            const data = await res.json();

            const container = document.getElementById("clips");
            container.innerHTML = "";

            if (!data.data || data.data.length === 0) {
                container.innerHTML = "<p>Aucun clip disponible pour le moment.</p>";
                return;
            }

            data.data.forEach(clip => {
                const card = document.createElement("div");
                card.className = "clip-card";

                const thumb = clip.thumbnail_url
                    .replace("-preview-480x272.jpg", "-preview-320x180.jpg");

                card.innerHTML = `
                    <img src="${thumb}" class="clip-thumb">
                    <h3>${clip.title}</h3>
                    <button onclick="window.open('https://clips.twitch.tv/${clip.id}', '_blank')">
                        ▶ Voir le clip
                    </button>
                `;

                container.appendChild(card);
            });

        } catch (err) {
            console.error("Erreur lors du chargement des clips :", err);
        }
    }

    loadClips();
    </script>

    <!-- POPUP AIDE -->
    <div id="help-modal" class="modal">
        <div class="modal-content">
            <h2>Aide</h2>
            <p>
                Si vous avez besoin d'aide, veuillez contacter le modérateur du site  
                dans le salon <strong>"site internet"</strong> sur Discord :
            </p>

            <a href="https://discord.gg/ChRDm27m9Y" target="_blank" class="discord-link">
                Ouvrir le Discord
            </a>

            <button id="close-help" class="close-btn">Fermer</button>
        </div>
    </div>

    <!-- SCRIPT DU MENU PARAMÈTRES -->
    <script src="script.js"></script>

    <!-- SCRIPT POPUP AIDE -->
    <script>
        const helpBtn = document.getElementById("help-btn");
        const helpModal = document.getElementById("help-modal");
        const closeHelp = document.getElementById("close-help");

        helpBtn.addEventListener("click", () => {
            helpModal.style.display = "flex";
        });

        closeHelp.addEventListener("click", () => {
            helpModal.style.display = "none";
        });

        helpModal.addEventListener("click", (e) => {
            if (e.target === helpModal) {
                helpModal.style.display = "none";
            }
        });
    </script>

</body>
</html>
