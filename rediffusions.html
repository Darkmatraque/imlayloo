<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Rediffusions - Imlayloo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Imlayloo</h1>
    <nav>
        <a href="index.html">Accueil</a>
        <a href="clips.html">Clips</a>
        <a href="rediffusions.html">Rediffusions</a>
        <a href="reseaux.html">Réseaux</a>
    </nav>
</header>

<div id="vods"></div>

<script>
const clientId = "aupzds04y3oa2il45qns8908yjebsn";
const userId = "196955395";

async function getToken() {
    const res = await fetch("https://id.twitch.tv/oauth2/token?client_id=" + clientId + "&grant_type=client_credentials", {
        method: "POST"
    });
    return (await res.json()).access_token;
}

function formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString("fr-FR", {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
    });
}

async function loadVods() {
    const token = await getToken();

    const res = await fetch(`https://api.twitch.tv/helix/videos?user_id=${userId}&type=archive&first=10`, {
        headers: {
            "Client-ID": clientId,
            "Authorization": "Bearer " + token
        }
    });

    const data = await res.json();
    const container = document.getElementById("vods");

    data.data.forEach(vod => {
        const div = document.createElement("div");
        div.className = "vod";

        div.innerHTML = `
            <div class="date">${formatDate(vod.created_at)}</div>
            <iframe src="https://player.twitch.tv/?video=${vod.id}&parent=darkmatraque.github.io&autoplay=false" allowfullscreen></iframe>
        `;

        container.appendChild(div);
    });
}

loadVods();
</script>

</body>
</html>
