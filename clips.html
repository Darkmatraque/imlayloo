<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Clips - Imlayloo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Bouton paramètres -->
    <div class="settings-container">
        <div class="settings-button">⚙️</div>

        <div class="settings-menu">
            <a href="#">Aide</a>
            <a href="#">Mode</a>
        </div>
    </div>

    <header>
        <h1>Imlayloo</h1>
        <nav>
            <a href="index.html">Accueil</a>
            <a href="clips.html" class="active">Clips</a>
            <a href="rediffusions.html">Rediffusions</a>
            <a href="reseaux.html">Réseaux</a>
            <a href="commandes.html">Commandes</a>
            <a href="apropos.html">À propos</a>
        </nav>
    </header>

    <section class="section">
        <h2>Clips</h2>
        <div class="grid" id="clips"></div>
    </section>

    <!-- SCRIPT TWITCH (fetch) -->
    <script>
    const api = "https://imlayloo-api.kevin2007baumann.workers.dev";
    const userId = "795341067"; // ✔️ BON ID TWITCH

    async function loadClips() {
        try {
            const res = await fetch(`${api}?endpoint=clips&broadcaster_id=${userId}&first=12`);
            const data = await res.json();

            const container = document.getElementById("clips");
            container.innerHTML = ""; // Nettoyage

            if (!data.data || data.data.length === 0) {
                container.innerHTML = "<p>Aucun clip disponible pour le moment.</p>";
                return;
            }

            data.data.forEach(clip => {
                const iframe = document.createElement("iframe");
                iframe.src = `https://clips.twitch.tv/embed?clip=${clip.id}&parent=darkmatraque.github.io&autoplay=false`;
                iframe.width = "100%";
                iframe.height = "200";
                iframe.frameBorder = "0";
                iframe.allowFullscreen = true;
                container.appendChild(iframe);
            });

        } catch (err) {
            console.error("Erreur lors du chargement des clips :", err);
        }
    }

    loadClips();
    </script>

    <!-- SCRIPT DU MENU PARAMÈTRES -->
    <script src="script.js"></script>

</body>
</html>
